trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

steps:
# 1. Instalar Emscripten SDK (emsdk)
- script: |
    git clone https://github.com/emscripten-core/emsdk.git
    cd emsdk
    ./emsdk install latest
    ./emsdk activate latest
    echo "##vso[task.prependpath]$(pwd)"
  displayName: 'Instalar Emscripten'

# 2. Compilar para Web usando CMake y Ninja
- script: |
    source ./emsdk/emsdk_env.sh
    mkdir build-web
    cd build-web
    emcmake cmake .. -DPLATFORM=Web -DCMAKE_BUILD_TYPE=Release
    make
  displayName: 'Build con Emscripten'

# 3. Publicar los artefactos (HTML, JS, WASM)
- task: PublishBuildArtifacts@1
  inputs:
    PathtoPublish: 'build-web'
    ArtifactName: 'tetris-web'
    publishLocation: 'Container'

- script: |
    cd build-web
    git init
    git config user.email "devops@azure.com"
    git config user.name "Azure Pipeline"
    git add .
    git commit -m "Deploy Tetris Web - Build $(Build.BuildId)"
    # Reemplaza con tu usuario y nombre de repo
    git push --force https://$(GH_TOKEN)@github.com/TuUsuario/NombreRepo.git master:gh-pages
  displayName: 'Desplegar a GitHub Pages'
  condition: succeeded()