name: CI/CD Build & Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  # --- JOB 1: WEB BUILD (Linux) ---
  build-web:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Ninja
      run: sudo apt-get install -y ninja-build

    - name: Install Emscripten
      uses: mymindstorm/setup-emsdk@v14
      with:
        version: 3.1.64
      
    - name: Configure CMake (Web)
      run: |
        mkdir build-web
        cd build-web
        emcmake cmake .. -DPLATFORM=Web -DCMAKE_BUILD_TYPE=Release -G Ninja -DCMAKE_C_COMPILER=emcc -DCMAKE_CXX_COMPILER=em++
    
    - name: Build Web
      run: |
        cd build-web
        ninja
    
    - name: Prepare Web Artifacts
      run: |
        mkdir dist
        cp build-web/index.html dist/
        cp build-web/index.js dist/
        cp build-web/index.wasm dist/
        cp build-web/index.data dist/

    - name: Upload Web Artifact
      uses: actions/upload-artifact@v4
      with:
        name: web-build
        path: dist
    
    - name: Deploy to GitHub Pages
      if: github.event_name != 'pull_request'
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./dist

  # --- JOB 2: BUILD WINDOWS (Windows Server) ---
  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure CMake (Windows)
      run: cmake -S . -B build-desktop -DCMAKE_BUILD_TYPE=Release
      
    - name: Build Windows
      run: cmake --build build-desktop --config Release

    - name: Prepare Windows Artifacts
      shell: powershell
      run: |
        # Create a clean staging directory
        mkdir staging-windows
        # Copy the .exe to the root of staging
        copy build-desktop\Release\*.exe staging-windows\
        # Copy the resources folder so it sits next to the .exe
        xcopy /E /I resources staging-windows\resources

    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-build
        path: staging-windows
  
  # --- JOB 3: BUILD ANDROID (APK) ---
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your game code
        uses: actions/checkout@v4
        with:
          path: game-source

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          echo "y" | sudo ${ANDROID_HOME}/tools/bin/sdkmanager --install "ndk;25.2.9519653"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Clone Raylib Android Template
        run: |
          git clone --depth 1 https://github.com/raysan5/raylib-game-template.git android-project
          # Remove the example game
          rm -rf android-project/game/src

      - name: Copy your game source into the template
        run: |
          mkdir -p android-project/game/src
          cp -r game-source/src/* android-project/game/src/
          cp -r game-source/app/* android-project/game/src/   # adjust if your app sources are separate
          cp -r game-source/resources android-project/game/assets/   # resources become assets

      - name: Build APK
        working-directory: android-project
        run: |
          # The template uses a simple build.sh script that calls CMake with the NDK
          chmod +x build.sh
          ./build.sh -p android -b

      - name: Rename APK with version
        run: |
          VERSION=${{ github.ref_name }}
          mv android-project/build/android/game.apk game-android-${VERSION}.apk

      - name: Upload Android APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: game-android-*.apk

  # --- JOB 4: CREATE RELEASE (Only on Tags) ---
  create-release:
    needs: [build-web, build-windows, build-android]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download Web Artifact
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: web-build

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: windows-build

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: ./

      - name: Package Files
        run: |
          VERSION=${{ github.ref_name }}
          cd web-build
          zip -r "../game-web-${VERSION}.zip" .
          cd ..
          
          cd windows-build
          zip -r "../game-windows-${VERSION}.zip" .
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            game-web-${{ github.ref_name }}.zip
            game-windows-${{ github.ref_name }}.zip
            game-android-${{ github.ref_name }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}