name: Deploy Raylib Project to GitHub Pages

on:
  push:
    branches: [ main ] # Verifica si tu rama es 'main' o 'master'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Ninja
      run: sudo apt-get install -y ninja-build

    - name: Install Emscripten
      uses: mymindstorm/setup-emsdk@v14
      with:
        version: 3.1.64

    - name: Configure CMake (Web)
      run: |
        mkdir build-web
        cd build-web
        emcmake cmake .. \
          -DPLATFORM=Web \
          -DCMAKE_BUILD_TYPE=Release \
          -G Ninja \
          -DCMAKE_C_COMPILER=emcc \
          -DCMAKE_CXX_COMPILER=em++

    - name: Build Project
      run: |
        cd build-web
        ninja

    - name: Prepare Artifacts
      # Creamos una carpeta limpia con solo lo necesario para la web
      run: |
        mkdir dist
        cp build-web/index.html dist/
        cp build-web/index.js dist/
        cp build-web/index.wasm dist/
        # Si tienes una carpeta de recursos (sonidos, imágenes), cópiala también:
        # cp -r resources dist/ || true

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./dist  # Ahora apuntamos a la carpeta limpia

    