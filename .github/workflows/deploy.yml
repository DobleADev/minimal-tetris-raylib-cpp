name: CI/CD Build & Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  # --- JOB 1: WEB BUILD (Linux) ---
  build-web:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Ninja
      run: sudo apt-get install -y ninja-build

    - name: Install Emscripten
      uses: mymindstorm/setup-emsdk@v14
      with:
        version: 3.1.64
      
    - name: Configure CMake (Web)
      run: |
        mkdir build-web
        cd build-web
        emcmake cmake .. -DPLATFORM=Web -DCMAKE_BUILD_TYPE=Release -G Ninja -DCMAKE_C_COMPILER=emcc -DCMAKE_CXX_COMPILER=em++
    
    - name: Build Web
      run: |
        cd build-web
        ninja
    
    - name: Prepare Web Artifacts
      run: |
        mkdir dist
        cp build-web/index.html dist/
        cp build-web/index.js dist/
        cp build-web/index.wasm dist/
        cp build-web/index.data dist/

    - name: Upload Web Artifact
      uses: actions/upload-artifact@v4
      with:
        name: web-build
        path: dist
    
    - name: Deploy to GitHub Pages
      if: github.event_name != 'pull_request'
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./dist

  # --- JOB 2: BUILD WINDOWS (Windows Server) ---
  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure CMake (Windows)
      run: cmake -S . -B build-desktop -DCMAKE_BUILD_TYPE=Release
      
    - name: Build Windows
      run: cmake --build build-desktop --config Release

    - name: Prepare Windows Artifacts
      shell: powershell
      run: |
        # Create a staging directory for the release structure
        mkdir staging-windows
        # Copy the executable from the build folder
        copy build-desktop\Release\*.exe staging-windows\
        # Copy the resources folder into the staging directory
        xcopy /E /I resources staging-windows\resources
        
    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-build
        path: staging-windows

  # --- JOB 3: CREATE RELEASE (Only on Tags) ---
  create-release:
    needs: [build-web, build-windows]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download Web Artifact
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: web-build

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: windows-build

      - name: Prepare and Package Files
        run: |
          VERSION=${{ github.ref_name }}
          # Package Web files
          zip -r "game-web-${VERSION}.zip" web-build
          
          # Package Windows files (Includes .exe and resources folder)
          # We rename the folder or zip directly to ensure the version is in the filename
          zip -r "game-windows-${VERSION}.zip" windows-build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            game-web-${{ github.ref_name }}.zip
            game-windows-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}