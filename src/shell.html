<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raylib Web Game</title>
    <style>
        body {
            margin: 0;
            background-color: #0f1115; /* Fondo oscuro minimalista */
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #canvas-container {
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #333;
        }

        canvas.emscripten {
            border: 0 none;
            background-color: black;
            display: block;
        }

        /* Indicador de carga */
        #status {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: bold;
            color: #4db8ff;
        }

        .spinner {
            height: 30px;
            width: 30px;
            margin: 0 auto;
            border-left: 5px solid #4db8ff;
            border-right: 5px solid #4db8ff;
            border-bottom: 5px solid #4db8ff;
            border-top: 5px solid #1a1a1a;
            border-radius: 100%;
            animation: rotation 0.8s linear infinite;
        }

        @keyframes rotation {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="canvas-container">
        <div id="status">Iniciando...</div>
        <div class="spinner" id="spinner"></div>
        <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
    </div>

    <script type='text/javascript'>
        var statusElement = document.getElementById('status');
        var spinnerElement = document.getElementById('spinner');

        var Module = {
            preRun: [],
            postRun: [],
            print: (function() {
                return function(text) {
                    if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
                    console.log(text);
                };
            })(),
            canvas: (function() {
                var canvas = document.getElementById('canvas');
                return canvas;
            })(),
            setStatus: function(text) {
                if (!Module.setStatus.last) Module.setStatus.last = { time: Date.now(), text: '' };
                if (text === Module.setStatus.last.text) return;
                var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
                if (m) {
                    text = m[1];
                }
                statusElement.innerHTML = text;
                if (text === '') {
                    statusElement.style.display = 'none';
                    spinnerElement.style.display = 'none';
                } else {
                    statusElement.style.display = 'block';
                    spinnerElement.style.display = 'block';
                }
            },
            totalDependencies: 0,
            monitorRunDependencies: function(left) {
                this.totalDependencies = Math.max(this.totalDependencies, left);
                Module.setStatus(left ? 'Preparando... (' + (this.totalDependencies-left) + '/' + this.totalDependencies + ')' : 'Todo listo!');
            }
        };
        Module.setStatus('Descargando...');
        window.onerror = function() {
            Module.setStatus('Error en la ejecución. Revisa la consola.');
            spinnerElement.style.display = 'none';
            Module.setStatus = function(text) {
                if (text) console.error('[status] ' + text);
            };
        };
    </script>
    {{{ SCRIPT }}}
</body>
</html>
